<?xml version="1.0" encoding="UTF-8"?>
<svg width="260" height="80" viewBox="0 0 260 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cart icon -->
  <g transform="translate(8,18)">
    <!-- Cart frame -->
    <path d="M5 10 H70 L63 38 H16 L9 14 Z" fill="none" stroke="#4A4A4A" stroke-width="2.6" stroke-linejoin="round"/>
    <!-- Handle -->
    <path d="M5 10 C2 4 4 2 10 2 H22" fill="none" stroke="#4A4A4A" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Stripes inside cart -->
    <rect x="15" y="14" width="45" height="6" rx="2" fill="#F39C12"/>
    <rect x="15" y="22" width="45" height="6" rx="2" fill="#E67E22"/>
    <rect x="15" y="30" width="45" height="6" rx="2" fill="#F1C40F"/>
    <!-- Wheels -->
    <circle cx="23" cy="44" r="4" fill="#4A4A4A"/>
    <circle cx="53" cy="44" r="4" fill="#4A4A4A"/>
  </g>

  <!-- Divider line between icon and text -->
  <line x1="102" y1="18" x2="102" y2="62" stroke="#E0E0E0" stroke-width="2"/>

  <!-- Brand text -->
  <!-- "City" in dark bold -->
  <text x="116" y="36" font-family="Poppins, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#333333">City</text>
  <!-- "Mart" in warm accent color -->
  <text x="116" y="56" font-family="Poppins, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600" font-size="20" fill="#F39C12">Mart</text>
</svg>
