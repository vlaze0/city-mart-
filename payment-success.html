<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - City Mart</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body class="payment-success-page">
    <header>
        <div class="container">
            <div class="navbar-left">
                <a href="index.html" class="navbar-logo-link">
                    <img src="./images/logo.png" alt="CityMart" class="navbar-logo">
                </a>
            </div>
        </div>
    </header>

    <main class="static-page">
        <div class="container">
            <h1 id="payment-success-heading">Thank you! Your payment was successful.</h1>
            <p id="payment-success-text">We are confirming your order details...</p>
            <p>
                You can view your order any time from the <strong>My Orders</strong> section after logging in.
            </p>
            <button class="checkout-primary-btn" onclick="window.location.href='index.html'">Back to Home</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 City Mart. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Read query params and adjust messaging for COD vs online payment
        (function () {
            const headingEl = document.getElementById('payment-success-heading');
            const textEl = document.getElementById('payment-success-text');
            if (!headingEl || !textEl) return;

            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');
            const method = (params.get('method') || '').toLowerCase();

            const hasOrderId = !!orderId;
            const orderSuffix = hasOrderId ? ` Order ID: ${orderId}` : '';

            if (method === 'cod') {
                // Cash on Delivery: emphasize order placement, not payment.
                headingEl.textContent = 'Thank you! Your order was placed successfully.';
                textEl.textContent = `Your Cash on Delivery order has been created successfully.${orderSuffix}`;
            } else {
                // Default / online payment case.
                headingEl.textContent = 'Thank you! Your payment was successful.';
                textEl.textContent = hasOrderId
                    ? `Your order has been confirmed. Order ID: ${orderId}`
                    : 'Your order has been confirmed.';
            }
        })();
    </script>
</body>
</html>
